# ============================================================
# Spark Defaults — Iceberg + Nessie + S3A (MinIO)
# ============================================================

# --- Extensões SQL ---
spark.sql.extensions                                 org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions

# --- Catálogo Iceberg via Nessie ---
spark.sql.catalog.local                              org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.local.catalog-impl                 org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.local.uri                          http://nessie:19120/api/v1
spark.sql.catalog.local.ref                          main
spark.sql.catalog.local.warehouse                    s3a://warehouse/
spark.sql.catalog.local.io-impl                      org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.local.s3.endpoint                  http://minio:9000
spark.sql.catalog.local.s3.path-style-access         true

# --- Hadoop S3A (para leitura/escrita direta) ---
spark.hadoop.fs.s3a.endpoint                         http://minio:9000
spark.hadoop.fs.s3a.access.key                       minioadmin
spark.hadoop.fs.s3a.secret.key                       minioadmin
spark.hadoop.fs.s3a.path.style.access                true
spark.hadoop.fs.s3a.impl                             org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled            false

# --- Catálogo padrão ---
spark.sql.defaultCatalog                             local

# --- Performance ---
spark.sql.adaptive.enabled                           true
spark.sql.adaptive.coalescePartitions.enabled         true
spark.serializer                                     org.apache.spark.serializer.KryoSerializer

# --- Thrift Server ---
spark.sql.hive.thriftServer.singleSession            false
