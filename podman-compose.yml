# ============================================================
# Lakehouse de Saúde — Stack Completo via Podman Compose
# MinIO + Nessie + Spark (Iceberg) + Airflow
# ============================================================

services:

  # ==========================================================
  # STORAGE: MinIO (emulação do S3)
  # ==========================================================
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console Web
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse-net

  # Inicialização dos buckets (roda uma vez e encerra)
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    volumes:
      - ./conf/minio/init-buckets.sh:/init-buckets.sh:ro
      - ./data/sample:/data/sample:ro
    entrypoint: /bin/sh
    command: >
      -c "
        /bin/sh /init-buckets.sh &&
        echo '📤 Enviando arquivo de amostra para o bucket bronze...' &&
        mc cp /data/sample/internacoes_sample.csv local/bronze/raw/internacoes/internacoes_sample.csv &&
        echo '✅ Arquivo enviado com sucesso!'
      "
    networks:
      - lakehouse-net

  # ==========================================================
  # CATALOG: Project Nessie (metadados Iceberg)
  # ==========================================================
  nessie:
    image: ghcr.io/projectnessie/nessie:0.106.0-java
    container_name: nessie
    ports:
      - "19120:19120"
    environment:
      - NESSIE_VERSION_STORE_TYPE=IN_MEMORY
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v1/config"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse-net

  # ==========================================================
  # COMPUTE: Spark Thrift Server + Iceberg + Nessie
  # ==========================================================
  spark:
    build:
      context: ./docker/spark
      dockerfile: Dockerfile
    container_name: spark
    depends_on:
      - minio
      - nessie
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - SPARK_DRIVER_MEMORY=1g
      - SPARK_EXECUTOR_MEMORY=1g
    ports:
      - "10000:10000"  # Thrift Server (JDBC/ODBC)
      - "4040:4040"    # Spark UI
      - "7077:7077"    # Spark Master
    volumes:
      - ./spark:/app/spark:ro
      - ./data:/app/data:ro
    mem_limit: 3g
    memswap_limit: 3g
    networks:
      - lakehouse-net

  # ==========================================================
  # ORCHESTRATOR: Apache Airflow (Webserver)
  # ==========================================================
  airflow-webserver:
    build:
      context: ./docker/airflow
      dockerfile: Dockerfile
    container_name: airflow-webserver
    depends_on:
      - spark
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__SECRET_KEY: supersecretkey123
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      # Variáveis do Pipeline
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      NESSIE_URI: http://nessie:19120/api/v1
      SPARK_THRIFT_HOST: spark
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./spark:/app/spark:ro
      - ./dbt_project:/app/dbt_project
      - ./data:/app/data:ro
      - airflow-db:/opt/airflow
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@localhost || true &&
        airflow webserver
      "
    networks:
      - lakehouse-net

  # ==========================================================
  # ORCHESTRATOR: Apache Airflow (Scheduler)
  # ==========================================================
  airflow-scheduler:
    build:
      context: ./docker/airflow
      dockerfile: Dockerfile
    container_name: airflow-scheduler
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      # Variáveis do Pipeline
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      NESSIE_URI: http://nessie:19120/api/v1
      SPARK_THRIFT_HOST: spark
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./spark:/app/spark:ro
      - ./dbt_project:/app/dbt_project
      - ./data:/app/data:ro
      - airflow-db:/opt/airflow
    command: airflow scheduler
    networks:
      - lakehouse-net

# ==========================================================
# VOLUMES & REDES
# ==========================================================
volumes:
  minio-data:
    driver: local
  airflow-db:
    driver: local

networks:
  lakehouse-net:
    driver: bridge
